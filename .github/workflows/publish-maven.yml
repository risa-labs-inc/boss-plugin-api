name: Publish to GitHub Packages

# Publishes ai.rever.boss.plugin:boss-plugin-api after each release so
# BossConsole can pin the API as a normal Maven dependency. The release
# workflow bump-pushes the version before tagging, so checking out the tag
# yields the released version.
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      # Guard: only publish versions that correspond to a real release tag.
      # The release workflow bump-pushes the version BEFORE tagging, so a
      # workflow_dispatch from a pre-bump main would otherwise publish the
      # previous version and silently fail to satisfy BossConsole's pin.
      - name: Verify version matches a release tag
        run: |
          VERSION=$(grep -E '^version = ' build.gradle.kts | sed -E 's/version = "(.*)"/\1/')
          git fetch --tags --quiet
          if ! git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "::error::build.gradle.kts version ${VERSION} has no release tag v${VERSION} — refusing to publish an unreleased version. Merge/release first, or dispatch from the release tag."
            exit 1
          fi
          echo "Publishing released version ${VERSION}"

      - name: Publish
        # All publications (boss-plugin-api + boss-plugin-api-core) to GitHub Packages.
        run: ./gradlew publishAllPublicationsToGitHubPackagesRepository
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
